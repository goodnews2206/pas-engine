name: PAS211K.2B Generate Python Constraints Artifact

# Manual-only. This workflow NEVER runs on push or pull_request, and it NEVER
# commits or pushes anything to the repository. It only produces a constraints
# artifact for human review as part of PAS211K.2B-prep. The actual review,
# scrub, commit of constraints.txt and nixpacks.toml update happen by hand in
# PAS211K.2B proper.
on:
  workflow_dispatch: {}

# Read-only token: the job cannot write to the repo even if a step tried to.
permissions:
  contents: read

jobs:
  generate-constraints:
    name: Generate constraints artifact (Python 3.11 / Ubuntu 24.04)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create clean virtualenv and install requirements
        run: |
          set -euo pipefail
          python3.11 -m venv .venv
          . .venv/bin/activate
          # Mirror the nixpacks build behavior, which runs `pip install --upgrade pip`.
          # The resolved pip version is recorded in the constraints header below so
          # PAS211K.2B can deliberately pin it (or drop the upgrade) afterwards.
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate raw constraints (pip freeze)
        run: |
          set -euo pipefail
          . .venv/bin/activate
          pip freeze > constraints.raw.txt

      - name: Generate constraints.txt with header
        run: |
          set -euo pipefail
          . .venv/bin/activate
          {
            echo "# constraints.txt — GENERATED ARTIFACT, DO NOT HAND-EDIT"
            echo "# requirements.txt remains the source of truth; this file pins the"
            echo "# full resolved transitive graph for deterministic installs."
            echo "# Generated by .github/workflows/pas211k-2b-generate-constraints.yml"
            echo "# python : $(python -V 2>&1)"
            echo "# os     : $(uname -srmo)"
            echo "# pip    : $(pip --version)"
            echo "# date   : $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "# NOTE   : GitHub Actions Python 3.11 / Linux is close to, but NOT"
            echo "#          byte-identical to, Railway/Nixpacks (nixpkgs python311)."
            echo "#          Review and scrub (editable / local-path / self lines) in"
            echo "#          PAS211K.2B before committing."
            echo "#"
            cat constraints.raw.txt
          } > constraints.txt
          echo "----- environment recorded in header -----"
          sed -n '1,12p' constraints.txt

      - name: Validate — pip check
        run: |
          set -euo pipefail
          . .venv/bin/activate
          python -m pip check

      - name: Validate — compileall
        run: |
          set -euo pipefail
          . .venv/bin/activate
          python -m compileall -q app scripts tests

      - name: Validate — pytest tests/mvp
        run: |
          set -euo pipefail
          . .venv/bin/activate
          pytest tests/mvp -q

      - name: Upload constraints artifact
        uses: actions/upload-artifact@v4
        with:
          name: pas211k-2b-python-constraints
          path: |
            constraints.txt
            constraints.raw.txt
          if-no-files-found: error
